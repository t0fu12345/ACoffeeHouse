<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        word-wrap: normal;
        white-space: nowrap;
        direction: ltr;
      }
      
      .glass-effect {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .btn-tactile:active {
        transform: translateY(1px);
      }
    </style>

<body class="min-h-screen flex flex-col font-body-md text-on-surface relative overflow-x-hidden">
<!-- Full-screen Background Layer -->
<div class="fixed inset-0 z-0 bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCfndfTX_VzizWqi2gSaNfvtJmZeTXGGVAXf2vMQrIZ8GPGDmzArSic3AoHg5NfORMJzWjWQ17NuIly18eaiOpMLcOS1gsJB44Ub5OZofXxaCf3PVHWdvFRibwE15eRgG6b1PCMHYV4-7RZAFYoPVDDGKkql_vS1cb1uI-Bx07_v3tAxobjC4ehNXS3UQzY-zt2nZDg34omodRQ68Xhb1E0z3qmDWzK2puU6eb7s_oc_3Efw80UQHvnpHUguZsM8K3SdK5HvTNJbNY');">
<div class="absolute inset-0 bg-espresso-deep/30"></div>
</div>
<!-- Header -->
<header class="relative z-10 w-full px-margin-desktop py-4 flex justify-between items-center bg-transparent">
<div class="font-headline-md text-headline-md font-bold text-white">ACoffeeHouse</div>
<div class="flex items-center gap-4">
<a class="text-white/80 font-semibold font-label-lg text-label-lg hover:text-white transition-all" href="#">EN</a>
<div class="w-px h-4 bg-white/30"></div>
<a class="text-white/80 font-semibold font-label-lg text-label-lg hover:text-white transition-all" href="#">Sign In</a>
</div>
</header>
<!-- Main Content: Glassmorphism Signup Card -->
<main class="relative z-10 flex-grow flex items-center justify-center px-margin-mobile py-12 md:py-24">
<div class="glass-effect w-full max-w-lg rounded-xl shadow-2xl p-8 md:p-10 transition-all duration-300">
<!-- Header Section -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-16 h-16 bg-espresso-deep rounded-full mb-4 shadow-lg">
<span class="material-symbols-outlined text-white text-3xl">coffee_maker</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-espresso-deep mb-2">Create New Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Join ACoffeeHouse to manage your shop professionally.</p>
</div>
<!-- Signup Form -->
<form action="#" class="space-y-5" onsubmit="return false;">
<!-- Full Name -->
<div class="space-y-1.5">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1" for="full_name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full pl-12 pr-4 py-3 bg-white/50 border border-latte-warm rounded-lg focus:ring-2 focus:ring-mocha-accent focus:border-mocha-accent transition-all outline-none text-body-lg font-body-lg" id="full_name" name="full_name" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Phone Number -->
<div class="space-y-1.5">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1" for="phone">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">call</span>
<input class="w-full pl-12 pr-4 py-3 bg-white/50 border border-latte-warm rounded-lg focus:ring-2 focus:ring-mocha-accent focus:border-mocha-accent transition-all outline-none text-body-lg font-body-lg" id="phone" name="phone" placeholder="+1 234 567 890" type="tel"/>
</div>
</div>
<!-- Email -->
<div class="space-y-1.5">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-12 pr-4 py-3 bg-white/50 border border-latte-warm rounded-lg focus:ring-2 focus:ring-mocha-accent focus:border-mocha-accent transition-all outline-none text-body-lg font-body-lg" id="email" name="email" placeholder="example@artisanbrew.com" type="email"/>
</div>
</div>
<!-- Password Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Password -->
<div class="space-y-1.5">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-12 pr-4 py-3 bg-white/50 border border-latte-warm rounded-lg focus:ring-2 focus:ring-mocha-accent focus:border-mocha-accent transition-all outline-none text-body-lg font-body-lg" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Password Confirmation -->
<div class="space-y-1.5">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1" for="password_confirm">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">key</span>
<input class="w-full pl-12 pr-4 py-3 bg-white/50 border border-latte-warm rounded-lg focus:ring-2 focus:ring-mocha-accent focus:border-mocha-accent transition-all outline-none text-body-lg font-body-lg" id="password_confirm" name="password_confirm" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Terms and Conditions -->
<div class="flex items-start gap-3 py-2">
<div class="flex items-center h-5">
<input class="w-5 h-5 rounded border-latte-warm text-espresso-deep focus:ring-mocha-accent cursor-pointer transition-all" id="terms" type="checkbox"/>
</div>
<label class="font-body-md text-body-md text-on-surface-variant" for="terms">I agree to the <a class="text-mocha-accent font-semibold hover:underline" href="#">Terms &amp; Conditions</a> and Privacy Policy of ACoffeeHouse.</label>
</div>
<!-- Register Button -->
<button class="btn-tactile w-full py-4 bg-espresso-deep text-white font-label-lg text-label-lg rounded-lg shadow-lg hover:bg-primary hover:shadow-xl transition-all flex items-center justify-center gap-2 group active:scale-[0.98]" type="submit">
<span>Register Now</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Language Switcher -->
<div class="mt-8 pt-6 border-t border-latte-warm/50 flex justify-center items-center gap-4">
<button class="font-label-md text-label-md text-outline hover:text-mocha-accent transition-colors">Tiếng Việt</button>
<div class="w-1 h-1 rounded-full bg-latte-warm"></div>
<button class="font-label-md text-label-md text-mocha-accent font-bold">English</button>
</div>
</div>
</main>
<!-- Footer -->
<footer class="relative z-10 w-full py-8 mt-auto flex flex-col md:flex-row justify-between items-center px-margin-desktop gap-4">
<div class="flex items-center gap-2 bg-white/10 backdrop-blur-sm px-4 py-2 rounded-full border border-white/20">
<span class="w-2.5 h-2.5 rounded-full bg-status-active animate-pulse"></span>
<span class="font-label-md text-label-md text-white">Server: Operational</span>
</div>
<div class="text-center md:text-right">
<p class="font-body-md text-body-md text-white/80">© 2024 ACoffeeHouse Systems. All rights reserved.</p>
<div class="flex items-center justify-center md:justify-end gap-4 mt-1">
<a class="font-label-md text-label-md text-white/60 hover:text-white transition-colors" href="#">Privacy Policy</a>
<a class="font-label-md text-label-md text-white/60 hover:text-white transition-colors" href="#">Support</a>
</div>
</div>
</footer>
<!-- Micro-interactions Script -->
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        const parent = input.closest('.relative');
        if (parent) {
          const icon = parent.querySelector('.material-symbols-outlined');
          if (icon) icon.style.color = '#795548';
        }
      });
      input.addEventListener('blur', () => {
        const parent = input.closest('.relative');
        if (parent) {
          const icon = parent.querySelector('.material-symbols-outlined');
          if (icon) icon.style.color = '#827472';
        }
      });
    });
  });
</script>
</body></html>
